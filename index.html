<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Morpho Integration Blueprint — Demo App</title>
<link rel="icon" type="image/svg+xml" href="logos/morpho.svg" />
<style>
/* Morpho brand typeface — FK Grotesk, self-hosted (matches app.morpho.org) */
@font-face{font-family:'FK Grotesk';src:url('fonts/FKGrotesk-Light.woff2') format('woff2');font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:'FK Grotesk';src:url('fonts/FKGrotesk-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'FK Grotesk';src:url('fonts/FKGrotesk-Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'FK Grotesk';src:url('fonts/FKGrotesk-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}
/* Body — Untitled Sans (design system Body face) */
@font-face{font-family:'Untitled Sans';src:url('fonts/UntitledSans-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Untitled Sans';src:url('fonts/UntitledSans-Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'Untitled Sans';src:url('fonts/UntitledSans-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}
/* Labels / numerics — FK Grotesk Mono (design system Subheading face) */
@font-face{font-family:'FK Grotesk Mono';src:url('fonts/FKGroteskMono-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'FK Grotesk Mono';src:url('fonts/FKGroteskMono-Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
:root{
  /* Morpho Design System — Dark mode (Figma "Theme" collection, resolved) */
  --bg:#15181A; --bg2:#15181A; --panel:#1E2227; --panel2:#2C313A;   /* Card/Page, Surface Default, Level/3 */
  --border:#2C313A; --border2:#464F60;                              /* Stroke Quaternary / Tertiary */
  --text:#FFFFFF; --muted:#95A1B8; --muted2:#5B677E;                /* Foreground Primary / Tertiary / Quaternary */
  --accent:#3C80FF; --accent2:#5792FF; --accent-soft:rgba(87,146,255,.16);   /* Background/Brand, Foreground/Brand, Opacity 16% */
  --fixed:#86B1FF; --fixed2:#86B1FF; --fixed-soft:rgba(0,49,133,.55);        /* Morpho Midnight (#003185) product */
  --green:#72C6BC; --green-soft:rgba(114,198,188,.16);             /* Success */
  --amber:#FCC27F; --amber-soft:rgba(252,194,127,.16);             /* Warning */
  --red:#FF7792; --red-soft:rgba(255,119,146,.16);                 /* Error */
  --radius:14px; --radius-sm:10px;
  --shadow:0 12px 40px rgba(18,18,18,.5);
  --btn-shadow:0 6px 20px rgba(60,128,255,.32);
  --glow1:rgba(87,146,255,.16); --glow2:rgba(87,146,255,.08);
  --overlay:rgba(18,18,18,.6);
  --surface-soft:rgba(255,255,255,.03); --surface-softer:rgba(255,255,255,.015);
  --hairline:rgba(255,255,255,.06);
  --tint:rgba(87,146,255,.06);
  --code-bg:#05070B; --code-bg2:#0A0D13; --code-text:#C7D0E0;
  --markshadow:rgba(0,0,0,.5);
  --font:'Untitled Sans','FK Grotesk',ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --font-head:'FK Grotesk','Untitled Sans',ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --mono:'FK Grotesk Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
html[data-theme="light"]{
  /* Morpho Design System — Light mode (Figma "Theme" collection, resolved) */
  --bg:#EDF3FE; --bg2:#EDF3FE; --panel:#FFFFFF; --panel2:#DEE8FC;   /* Card/Page, Surface Default, Level/3 */
  --border:#D0DDF7; --border2:#B1C0DD;                              /* Stroke Quaternary / Tertiary */
  --text:#15181A; --muted:#5B677E; --muted2:#95A1B8;               /* Foreground Primary / Tertiary / Quaternary */
  --accent:#3C80FF; --accent2:#3C80FF; --accent-soft:rgba(87,146,255,.16);
  --fixed:#003185; --fixed2:#003185; --fixed-soft:rgba(0,49,133,.10);
  --green:#3B978C; --green-soft:rgba(59,151,140,.14);
  --amber:#BA8242; --amber-soft:rgba(186,130,66,.14);
  --red:#D54469; --red-soft:rgba(213,68,105,.12);
  --shadow:0 12px 40px rgba(18,18,18,.1);
  --btn-shadow:0 6px 18px rgba(60,128,255,.22);
  --glow1:rgba(87,146,255,.1); --glow2:rgba(87,146,255,.05);
  --overlay:rgba(18,18,18,.35);
  --surface-soft:rgba(21,24,26,.04); --surface-softer:rgba(21,24,26,.02);
  --hairline:rgba(21,24,26,.06);
  --tint:rgba(87,146,255,.06);
  --markshadow:rgba(255,255,255,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font); background:
    radial-gradient(1100px 620px at 82% -8%, var(--glow1), transparent 60%),
    radial-gradient(820px 520px at 6% 4%, var(--glow2), transparent 55%),
    var(--bg);
  color:var(--text); -webkit-font-smoothing:antialiased; line-height:1.5;
  min-height:100vh;
}
a{color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.mono{font-family:var(--mono)}
h1,h2,h3,h4,h5{font-family:var(--font-head);font-weight:400}
b,strong{font-weight:400}
.section-label,.dsub-t{font-family:var(--mono)}

/* Layout */
.app{max-width:1180px;margin:0 auto;padding:22px 24px 80px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 22px}
.brand{display:flex;align-items:center;gap:11px;cursor:pointer}
.brand .logo{display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand .logo img{width:26px;height:26px;display:block;border-radius:7px}
.brand>div{font-size:15.5px;letter-spacing:-.2px;font-weight:400}
.brand span{color:var(--muted);font-size:12.5px;font-weight:400}
.topbar-right{display:flex;align-items:center;gap:10px}
.theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:999px;border:1px solid var(--border);background:var(--panel);color:var(--muted);transition:.15s}
.theme-toggle:hover{color:var(--text);border-color:var(--border2)}
.theme-toggle svg{width:16px;height:16px;display:block}
.pill{font-size:11.5px;color:var(--muted);border:1px solid var(--border);padding:6px 11px;border-radius:999px;background:var(--surface-softer)}
.pill.demo{color:var(--amber);border-color:rgba(245,166,35,.3);background:var(--amber-soft)}
.wallet{display:flex;align-items:center;gap:8px;font-size:12.5px;border:1px solid var(--border);padding:6px 12px;border-radius:999px;background:var(--panel)}
.wallet .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}

/* Home */
.hero{margin:4px 2px 26px}
.hero h1{font-size:30px;letter-spacing:-.7px;font-weight:400;margin-bottom:10px;max-width:760px}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,var(--accent2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{color:var(--muted);font-size:14.5px;max-width:680px}
.cards{display:grid;grid-template-columns:repeat(3,1fr) 0.72fr;gap:14px;margin-top:26px;align-items:stretch}
.card{position:relative;border:1px solid var(--border);border-radius:var(--radius);background:linear-gradient(180deg,var(--panel),var(--bg2));
  padding:20px;cursor:pointer;transition:.18s;overflow:hidden;min-height:212px;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:var(--shadow)}
.card .glow{position:absolute;inset:0;opacity:.5;pointer-events:none}
.card.earn .glow{background:radial-gradient(280px 130px at 80% 0%,rgba(49,196,141,.16),transparent 70%)}
.card.variable .glow{background:radial-gradient(280px 130px at 80% 0%,rgba(41,115,255,.18),transparent 70%)}
.card.fixed .glow{background:radial-gradient(280px 130px at 80% 0%,rgba(87,146,255,.18),transparent 70%)}
.card.dash{padding:16px;background:var(--surface-softer);border-style:dashed;min-height:auto}
.card.dash:hover{background:var(--surface-soft);box-shadow:none;transform:none;border-color:var(--border2)}
.card.dash .ico{width:30px;height:30px;font-size:14px;margin-bottom:10px;background:var(--surface-soft);border:1px solid var(--border)}
.card.dash .sub{color:var(--muted2);font-size:10px;letter-spacing:.6px}
.card.dash h3{font-size:14px;margin-bottom:5px}
.card.dash p{font-size:11.5px;line-height:1.5;color:var(--muted2)}
.card.dash .go{font-size:11.5px;color:var(--muted)}
.card.dash:hover .go{color:var(--text)}
.card .ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:14px}
.card.earn .ico{background:var(--green-soft);border:1px solid rgba(49,196,141,.3)}
.card.variable .ico{background:var(--accent-soft);border:1px solid rgba(41,115,255,.32)}
.card.fixed .ico{background:var(--fixed-soft);border:1px solid rgba(87,146,255,.34)}
.card h3{font-size:16.5px;letter-spacing:-.2px;margin-bottom:6px}
.card .sub{font-size:12px;color:var(--accent2);font-weight:400;margin-bottom:9px}
.card.earn .sub{color:var(--green)}
.card.fixed .sub{color:var(--fixed2)}
.card p{font-size:13px;color:var(--muted);flex:1}
.card .go{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:400;color:var(--text);margin-top:14px}
.card .go svg{transition:.18s}
.card:hover .go svg{transform:translateX(4px)}
.cardfoot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
.cardfoot .go{margin-top:0}
.learn{font-size:12px;font-weight:400;color:var(--muted2);text-decoration:none;white-space:nowrap;transition:.14s}
.learn:hover{color:var(--text)}
.home-note{margin-top:26px;border:1px dashed var(--border2);border-radius:var(--radius);padding:16px 18px;background:var(--tint);font-size:12.8px;color:var(--muted);display:flex;gap:12px;align-items:flex-start}
.home-note b{color:var(--text)}
.home-note .k{color:var(--accent2)}

/* Flow shell */
.flow-head{display:flex;align-items:center;gap:14px;margin:2px 2px 20px}
.back{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);border:1px solid var(--border);padding:7px 13px;border-radius:9px;background:var(--panel);transition:.15s}
.back:hover{color:var(--text);border-color:var(--border2)}
.flow-title{display:flex;align-items:center;gap:10px}
.flow-title .fico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.flow-title h2{font-size:18px;letter-spacing:-.3px}
.flow-title .tag{font-size:11.5px;color:var(--muted);font-weight:400}

/* Stepper */
.stepper{display:flex;gap:6px;margin:0 2px 22px;flex-wrap:wrap}
.stepper .st{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted2);padding:6px 4px}
.stepper .st .num{width:20px;height:20px;border-radius:50%;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:400;color:var(--muted2);flex-shrink:0}
.stepper .st.active{color:var(--text)}
.stepper .st.active .num{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px var(--accent-soft)}
.stepper .st.done{color:var(--muted)}
.stepper .st.done .num{background:var(--green);border-color:var(--green);color:#04150E}
.stepper .st.nav{cursor:pointer;border-radius:8px;transition:.14s}
.stepper .st.nav:hover{color:var(--text);background:var(--surface-soft)}
.stepper .st.nav:hover .num{box-shadow:0 0 0 4px rgba(49,196,141,.18)}
.stepper .sep{width:16px;height:1px;background:var(--border);align-self:center}

/* Panels & grid */
.grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px;align-items:start}
.panel{border:1px solid var(--border);border-radius:var(--radius);background:linear-gradient(180deg,var(--panel),var(--bg2));padding:20px}
.panel h4{font-size:15px;letter-spacing:-.2px;margin-bottom:4px}
.panel .desc{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted2);font-weight:400;margin:2px 0 11px}

/* Option list (vaults/markets) */
.opt{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 15px;margin-bottom:11px;cursor:pointer;transition:.15s;background:var(--bg2)}
.opt:hover{border-color:var(--border2);background:var(--panel2)}
.opt.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);background:var(--panel2)}
.opt-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.opt-id{display:flex;align-items:center;gap:11px}
.tok{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:400;color:#fff;flex-shrink:0;position:relative;overflow:hidden}
.tok img,.tok svg{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.tok.pair{position:relative;overflow:visible;background:none!important}
.tok.pair .tok{position:absolute;top:0}
.tokinline{display:inline-flex;align-items:center;gap:5px;vertical-align:middle;white-space:nowrap}
.tokinline .tok{flex-shrink:0}
.avset{display:inline-flex;align-items:center;vertical-align:middle}
.avset .av{margin-left:-7px;position:relative;cursor:default;transition:transform .12s}
.avset .av:first-child{margin-left:0}
.avset .av .tok{box-shadow:0 0 0 2px var(--bg2)}
.avset .av:hover{transform:translateY(-2px);z-index:6}
.avset .av .tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(3px);background:var(--panel2);border:1px solid var(--border2);color:var(--muted);font-size:11px;font-weight:400;padding:7px 10px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:.13s;box-shadow:var(--shadow);z-index:20;text-align:center}
.avset .av .tip b{color:var(--text);font-weight:400}
.avset .av .tip .tipx{display:block;margin-top:3px;color:var(--accent2);font-weight:400;font-size:10.5px}
.avset .av:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}
.avset .av .tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--panel2)}
.opt-name{font-size:14px;font-weight:400}
.opt-meta{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chiptag{font-size:10.5px;padding:2px 7px;border-radius:6px;background:var(--surface-soft);border:1px solid var(--border);color:var(--muted)}
.opt-apy{text-align:right}
.opt-apy .v{font-size:17px;font-weight:400;color:var(--green)}
.opt-apy .l{font-size:10.5px;color:var(--muted2)}
.opt-stats{display:flex;gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.opt-stats .s{font-size:11px}
.opt-stats .s .l{color:var(--muted2);margin-bottom:2px}
.opt-stats .s .v{font-weight:400;font-size:12.5px}
.warnrow{margin-top:10px;font-size:11.5px;color:var(--amber);display:flex;gap:7px;align-items:center}

/* Stat rows */
.rows{display:flex;flex-direction:column;gap:1px}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:13px;border-bottom:1px solid var(--hairline)}
.row:last-child{border-bottom:none}
.row .l{color:var(--muted);display:flex;align-items:center;gap:6px}
.row .v{font-weight:400;text-align:right}
.row .v.pos{color:var(--green)} .row .v.neg{color:var(--red)} .row .v.warn{color:var(--amber)}
.row .v .prev{color:var(--muted2);font-weight:400}
.row .v .arw{color:var(--muted2);margin:0 8px;font-weight:400}
.row.big{padding:12px 0}
.row.big .v{font-size:16px}
.help{width:14px;height:14px;border-radius:50%;border:1px solid var(--border2);font-size:9px;color:var(--muted2);display:inline-flex;align-items:center;justify-content:center;cursor:help}

/* Inputs */
.field{margin-bottom:16px}
.field label{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:7px}
.field label .bal{color:var(--muted2)}
.field label .bal b{color:var(--muted);font-weight:400}
.inp{display:flex;align-items:center;gap:10px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;background:var(--bg);transition:.15s}
.inp:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.inp input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:19px;font-weight:400;width:100%;font-family:var(--mono)}
.inp .assetbtn{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:400;background:var(--panel2);border:1px solid var(--border);padding:6px 10px;border-radius:8px}
.inp .maxbtn{font-size:11px;font-weight:400;color:var(--accent2);padding:5px 9px;border-radius:7px;background:var(--accent-soft)}
.inp .maxbtn:hover{background:rgba(41,115,255,.24)}
.usdsub{font-size:11.5px;color:var(--muted2);margin-top:7px;padding-left:3px}
.quickset{display:flex;gap:6px;margin-top:9px}
.quickset button{flex:1;font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:7px;padding:6px;background:var(--bg2);transition:.12s}
.quickset button:hover{border-color:var(--border2);color:var(--text)}
.quickset button.on{border-color:var(--accent);color:var(--text);background:var(--accent-soft)}

/* Health bar */
.health{margin:6px 0 2px}
.health-top{display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:8px}
.health-top .hf{font-weight:400;font-size:15px}
.hbar{height:9px;border-radius:6px;background:linear-gradient(90deg,var(--red),var(--amber) 42%,var(--green) 78%);position:relative;overflow:visible}
.hbar .mark{position:absolute;top:-4px;width:3px;height:17px;border-radius:2px;background:#fff;box-shadow:0 0 0 2px var(--markshadow);transition:left .35s cubic-bezier(.2,.8,.2,1)}
.hbar .liq{position:absolute;top:-3px;width:2px;height:15px;background:var(--red);opacity:.8}
.hscale{display:flex;justify-content:space-between;font-size:10px;color:var(--muted2);margin-top:6px}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:14px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;transition:.15s;background:var(--accent);color:#fff;box-shadow:var(--btn-shadow)}
.btn:hover{background:var(--accent2)}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border2);box-shadow:none}
.btn.ghost:hover{border-color:var(--muted2);background:var(--panel)}
.btn.sm{padding:10px;font-size:13px;width:auto;padding-left:16px;padding-right:16px}
.btn.danger{background:var(--red-soft);color:var(--red);border:1px solid rgba(240,97,109,.35);box-shadow:none}
.btn.danger:hover{background:rgba(240,97,109,.22)}
.btn-row{display:flex;gap:10px;margin-top:8px}

/* Bundle / review */
.bundle{border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);overflow:hidden;margin-bottom:16px}
.bundle-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:var(--panel2)}
.bundle-head .t{font-size:13px;font-weight:400;display:flex;align-items:center;gap:9px}
.bundle-head .badge{font-size:11px;font-weight:400;color:var(--accent2);background:var(--accent-soft);padding:4px 9px;border-radius:7px}
.bstep{display:flex;align-items:center;gap:12px;padding:12px 15px;border-top:1px solid var(--border);font-size:12.5px}
.bstep .bnum{width:22px;height:22px;border-radius:50%;background:var(--panel2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:.2s}
.bstep.active .bnum{background:var(--accent);border-color:var(--accent);color:#fff}
.bstep.done .bnum{background:var(--green);border-color:var(--green);color:#04150E}
.bstep .bt{flex:1}
.bstep .bt b{font-weight:400} .bstep .bt .d{font-size:11px;color:var(--muted2);margin-top:1px}
.bstep .spin{width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

      <div class="logo"><img src="logos/morpho.svg" alt="Morpho" width="26" height="26"></div>

<script>
/* ============================================================
   Morpho Integration Blueprint — mock demo app
   Three product templates: Earn (Vaults), Variable Borrow (Blue),
   Fixed Borrow (Midnight). All state in-memory. No storage APIs.
   ============================================================ */

const money = (n,d=2)=> n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const usd = (n)=> '$'+money(n, n>=1000?0:2);
const pct = (n,d=2)=> money(n,d)+'%';
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));

const S = {
  route:'home',
  product:null,      // 'earn' | 'variable' | 'fixed'
  step:0,
  sel:null,          // selected option index
  form:{},
  position:null,     // created position object
  showAdv:false,     // vault page: advanced section expanded
  quoteTimer:null,
  countdownTimer:null,
  dash:{earn:[],variable:[],fixed:[]},   // edge case sandbox
  dashKind:null,     // which detail view the sandbox is showing
  theme:'dark',      // 'dark' | 'light' — in-memory only (no storage APIs)
};

/* --- market/vault accessors --- */
const cPrice   = m => m.price;
const mLiq     = m => m.liq;                                   // market liquidity, $M
const fmtLiq   = v => v>=1 ? '$'+v.toFixed(1)+'M' : v>=0.01 ? '$'+Math.round(v*1000)+'K' : '$'+Math.round(v*1e6).toLocaleString('en-US');
const bidsOf   = m => m.bids;
const vaultAvail = v => v.liq*1e6;                             // vault withdrawable, in asset units


/* -------------------- MOCK DATA -------------------- */
const COL = {
  USDC:'#2775CA', WETH:'#627EEA', wstETH:'#00A3FF', cbBTC:'#F7931A',
  USDT:'#26A17B', DAI:'#F5AC37', ezETH:'#7B61FF', WBTC:'#F09242', sUSDe:'#5AC8FA'
};
// Trust Wallet asset CDN by mainnet address (real logos); falls back to colored initials if offline.
const ADDR = {
  USDC:'0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48', USDT:'0xdAC17F958D2ee523a2206206994597C13D831ec7',
  DAI:'0x6B175474E89094C44Da98b954EedeAC495271d0F', WETH:'0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2',
  WBTC:'0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599', wstETH:'0x7f39C581F595B53c5cb19bD0b3f8dA6c935E2Ca0',
  cbBTC:'0xcbB7C0000aB88B473b1f5aFd9ef808440eed33Bf', ezETH:'0xbf5495Efe5DB9ce00f80364C8B423567e58d2110',
  sUSDe:'0x9D39A5DE30e57443BfF2A8307A4256c8797A3497'
};
/* Canonical asset logos, self-hosted from Morpho's CDN (cdn.morpho.org/assets/logos). */
const TOKEN_LOGO = {
  USDC:'logos/tokens/usdc.svg', WETH:'logos/tokens/weth.svg', wstETH:'logos/tokens/wsteth.svg',
  cbBTC:'logos/tokens/cbbtc.svg', USDT:'logos/tokens/usdt.svg', DAI:'logos/tokens/dai.svg',
  ezETH:'logos/tokens/ezeth.svg', WBTC:'logos/tokens/wbtc.svg', sUSDe:'logos/tokens/susde.svg'
};
const logoUrl = s => TOKEN_LOGO[s] || '';

function tok(s,size=30,extra=''){

function seedDash(){
  const sp=1.0842;
  const mk=(i,col,borrow)=>{const m=MARKETS_V[i];const fee=borrow*m.origFee/100;
    return {type:'variable', m, col, debt:borrow+fee, received:borrow, apy:m.apy, day:0};};
  const fx=(i,col,recv,apy,days)=>{const m=MARKETS_F[i];const price=1/(1+apy/100*(m.days/365));
    const units=recv/price; const fee=recv*m.origFee/100;
    return {type:'fixed', m, col, debtUnits:units+fee, received:recv, blendedApy:apy, daysLeft:days??m.days};};
  S.dash={
    earn:[
      {vault:VAULTS[0], deposited:48200, shares:48200/sp, sharePrice:sp, elapsedDays:34},
      {vault:VAULTS[2], deposited:12500, shares:12500/sp, sharePrice:sp, elapsedDays:9},   // vault is short on liquidity
    ],
    // second variable loan sits at a high LTV; second fixed loan falls due in 3 days
    variable:[ mk(0,1.4,52000), mk(1,26,74500) ],
    fixed:[ fx(0,1.9,74000,6.41), fx(1,22,38000,7.18,3) ],
  };
}

}

function dashTotals(){
  const supplied=S.dash.earn.reduce((a,p)=>a+p.deposited+earnAccrued(p),0);
  const borrowed=S.dash.variable.reduce((a,p)=>a+p.debt,0)+S.dash.fixed.reduce((a,p)=>a+p.debtUnits,0);
  const collateral=[...S.dash.variable,...S.dash.fixed].reduce((a,p)=>a+p.col*cPrice(p.m),0);
  return {supplied,borrowed,collateral};
}

  if(S.detail) return `<div class="fade-in"><div id="screen">${inner}</div></div>`;

/* Loan tokens a market can currently lend out. Market liquidity is quoted in USD. */
function marketLiquidity(m){ return (mLiq(m)*1e6)/(PRICE_USD[m.loan]||1); }

function varMath(){
  const m=MARKETS_V[S.sel];
  const col=S.form.col||0;
  const borrow=S.form.borrow||0;          // amount the user receives
  const feeAmt=borrow*m.origFee/100;      // origination fee is ADDED to the debt
  const debt=borrow+feeAmt;               // what actually accrues interest
  const colValue=col*cPrice(m);
  const maxDebt=colValue*m.lltv/100;
  // a borrow is bounded by BOTH the collateral posted and the loan assets the market can supply
  const maxByCollateral=maxDebt/(1+m.origFee/100);
  const maxByLiquidity=marketLiquidity(m);
  const maxBorrow=Math.min(maxByCollateral,maxByLiquidity);
  const liqCapped=maxByLiquidity<maxByCollateral;
  const overLiquidity=borrow>maxByLiquidity;
  const ltv= colValue>0 ? (debt/colValue)*100 : 0;
  const liqPrice= col>0 ? debt/(col*m.lltv/100) : 0;
  const hf= debt>0 ? maxDebt/debt : Infinity;
  return {m,col,borrow,feeAmt,debt,colValue,ltv,maxDebt,maxByCollateral,maxByLiquidity,maxBorrow,liqCapped,overLiquidity,liqPrice,hf};
}

/* variable manage modals */
/* --- variable: simulate the resulting position for any combination of inputs --- */
const SAFETY = 1.05; // buffer kept above liquidation when withdrawing collateral
function varSim(repay=0, withdraw=0, add=0, borrow=0){
  const p=S.position, m=p.m;
  const feeAmt = borrow*m.origFee/100;
  const nd = Math.max(0, p.debt - repay + borrow + feeAmt);
  const nc = Math.max(0, p.col + add - withdraw);
  const cv = nc*cPrice(m);
  const maxDebt = cv*m.lltv/100;
  const ltv = cv>0 ? nd/cv*100 : 0;
  const hf  = nd>0 ? (cv>0?maxDebt/nd:0) : Infinity;
  const liq = (nc>0 && nd>0) ? nd/(nc*m.lltv/100) : 0;
  return {nd,nc,cv,maxDebt,ltv,hf,liq,feeAmt};
}
function varMaxWithdraw(repay=0){
  const p=S.position, m=p.m;
  const nd=Math.max(0,p.debt-repay);
  if(nd<=0) return p.col;
  const need=(nd/(m.lltv/100))/cPrice(m)*SAFETY;
  return Math.max(0,p.col-need);
}
/* what the market can still lend, net of what this position already drew */
function varRemainingLiquidity(p){ return Math.max(0, marketLiquidity(p.m) - (p.received||0)); }
function varMaxBorrow(add=0){
  const p=S.position, m=p.m;
  const cv=(p.col+add)*cPrice(m);
  // keep the same safety buffer varSimWarn enforces, so MAX never rejects itself
  const room=Math.max(0, cv*m.lltv/100/SAFETY - p.debt);
  // bounded by collateral AND by remaining market liquidity
  return Math.min(room/(1+m.origFee/100), varRemainingLiquidity(p));
}

function varSimRows(sim, opts={}){
  const p=S.position, m=p.m, cur=varMetrics();
  const dust = sim.nd<=0.005;
  return `
    ${Rd('Debt', money(p.debt,2)+' '+m.loan, dust?'0':money(sim.nd,2)+' '+m.loan)}
    ${Rd('Collateral', money(p.col,3)+' '+m.col, sim.nc<=0.00005?'0':money(sim.nc,3)+' '+m.col)}

    ${opts.feeAmt?R('Origination fee ('+pct(m.origFee,2)+') '+tip(FEE_TIP), '+'+money(opts.feeAmt,2)+' '+m.loan):''}

/* fixed math: walk the bid book */
function fxQuote(borrowUnits){
  const m=MARKETS_F[S.sel]; let remaining=borrowUnits, proceeds=0, filled=0;
  for(const [apy,depth] of bidsOf(m)){
    if(remaining<=0)break;
    const take=Math.min(remaining,depth);
    const price=1/(1+apy/100*(m.days/365)); // price per unit
    proceeds+=take*price; filled+=take; remaining-=take;
  }
  const fillable=filled; const blendedPrice=filled>0?proceeds/filled:0;
  const blendedApy= blendedPrice>0 ? ((1/blendedPrice)-1)*(365/m.days)*100 : m.bestApy;
  return {m, proceeds, filled:fillable, unfilled:Math.max(0,borrowUnits-fillable), blendedPrice, blendedApy};
}
function fxMath(){
  const m=MARKETS_F[S.sel];
  const debtUnits=S.form.units||0;        // principal debt units sold into the book
  const col=S.form.col||0;
  const q=fxQuote(debtUnits);
  const received=q.proceeds;              // user receives the full proceeds now
  const feeAmt=q.proceeds*m.origFee/100;  // origination fee is ADDED to the debt
  const totalDebt=debtUnits+feeAmt;       // total repayable at maturity
  const colValue=col*cPrice(m);
  const maxDebt=colValue*m.lltv/100;
  const ltv= colValue>0? totalDebt/colValue*100:0;
  const liqPrice= col>0? totalDebt/(col*m.lltv/100):0;
  const hf= totalDebt>0? (colValue*m.lltv/100)/totalDebt:Infinity;
  return {...q, m, debtUnits, col, feeAmt, received, totalDebt, colValue, maxDebt, ltv, liqPrice, hf};
}
/* Most loan token receivable now, given a collateral amount.
   Inverts: debtUnits + originationFee <= collateralValue * LLTV, then prices units off the book.
   Also capped by available bid depth. */
function fxMaxBorrowForCol(col){
  const m=MARKETS_F[S.sel];
  if(!col||col<=0) return 0;
  const price=1/(1+m.bestApy/100*(m.days/365));      // proceeds per debt unit
  const maxDebt=col*cPrice(m)*m.lltv/100;              // max units owed at maturity
  const depth=bidsOf(m).reduce((a,b)=>a+b[1],0);
  const units=Math.min(maxDebt/(1+price*m.origFee/100), depth);
  return units*price;                                 // receivable today
}

function fxMetrics(){
  const p=S.position; const m=p.m;
  const colValue=p.col*cPrice(m);

  return {p,m,colValue,maxDebt,hf,liqPrice,ltv,dl,matured,days,hrs};

          : `<div class="section-label">Maturity countdown</div>
             <div class="countdown"><div class="cd-cell"><div class="n">${days}</div><div class="u">days</div></div><div class="cd-cell"><div class="n">${hrs}</div><div class="u">hours</div></div><div class="cd-cell"><div class="n">${m.maturity.slice(5)}</div><div class="u">matures</div></div></div>
             <div class="divline"></div>`}
        ${healthBar(hf)}
        <div class="rows" style="margin-top:14px">
          ${Rbig('Loan at maturity '+tipWarn(MATURITY_TIP), money(p.debtUnits,2)+' '+m.loan)}
          ${R('Collateral', money(p.col,3)+' '+m.col+' · '+usd(colValue))}
          ${R('Fixed APY', pct(p.blendedApy))}
          ${R('Maturity date', m.maturity)}
          ${R('LTV', pct(ltv,1)+' / '+pct(m.lltv,0), liqCls(ltv,m.lltv))}
          ${R('Liquidation price', usd(liqPrice)+' per '+m.col,liqCls(ltv,m.lltv))}
        </div>
        <div class="divline"></div>
        <div class="btn-row">
          <button class="btn" onclick="fxRepay()">${matured?'Repay & withdraw':'Repay'}</button>
          <button class="btn ghost" onclick="openAddColFixed()">Add collateral</button>
        </div>
      </div>
      <div class="panel">
        <div class="section-label">More actions</div>
        <div class="manage-actions">
          <div class="maction" onclick="fxClosePosition()"><div class="mt"><span class="mi">✓</span> Repay all & withdraw</div><div class="md">Clears the debt and returns every ${m.col}</div></div>
          <div class="maction" onclick="openExitInfo()"><div class="mt"><span class="mi">ℹ</span> Exit options</div><div class="md">How closing works</div></div>
        </div>
        ${bp('Monitor & exit','Read outstanding debt + collateral. Debt is repaid at par at any time — the full fixed interest is owed for the whole term, so there is no early-repayment discount.',
          `<span class="kw">const</span> pos = <span class="kw">await</span> midnight.<span class="fn">getPosition</span>(market, user);\npos.debtUnits, pos.collateral, pos.maturity\n<span class="fn">repay</span>(market, amount) <span class="cm">// 1:1, any time</span>`)}
      </div>
    </div>
  </div>`;
}
/* --- fixed: simulate the resulting position --- */
// No secondary market: full fixed interest is always due, so debt is repaid at par (1:1),
// whether the user repays a second after borrowing or on the maturity date.
function fxRepayPrice(){ return 1; }
// price received today per unit of new debt taken on (current book best rate over remaining term)
function fxBorrowPrice(){ const p=S.position,m=p.m; const days=Math.max(1,p.daysLeft); return 1/(1+m.bestApy/100*(days/365)); }
function fxSim(repay=0, withdraw=0, add=0, borrow=0){
  const p=S.position, m=p.m;
  const unitsCleared = repay>0 ? Math.min(repay/fxRepayPrice(), p.debtUnits) : 0;
  const feeAmt = borrow*m.origFee/100;
  const unitsAdded = borrow>0 ? borrow/fxBorrowPrice() + feeAmt : 0;
  const nd = Math.max(0, p.debtUnits - unitsCleared + unitsAdded);
  const nc = Math.max(0, p.col + add - withdraw);
  const cv = nc*cPrice(m);
  const ltv = cv>0 ? nd/cv*100 : 0;
  const hf  = nd>0 ? (cv>0?(cv*m.lltv/100)/nd:0) : Infinity;
  const liq = (nc>0 && nd>0) ? nd/(nc*m.lltv/100) : 0;
  return {nd,nc,cv,ltv,hf,liq,feeAmt,unitsCleared,unitsAdded};
}
function fxMaxWithdraw(repay=0){
  const p=S.position, m=p.m;
  const nd=Math.max(0,p.debtUnits - (repay>0?Math.min(repay/fxRepayPrice(),p.debtUnits):0));
  if(nd<=0.005) return p.col;
  return Math.max(0, p.col - (nd/(m.lltv/100))/cPrice(m)*SAFETY);
}
function fxMaxBorrow(add=0){
  const p=S.position, m=p.m;
  const cv=(p.col+add)*cPrice(m);
  const roomUnits=Math.max(0, cv*m.lltv/100 - p.debtUnits);
  return roomUnits*fxBorrowPrice()/(1+m.origFee/100);
}
function fxSimRows(sim, opts={}){
  const p=S.position, m=p.m, cur=fxMetrics();
  const cleared = sim.nd<=0.005;
  return `
    ${Rd('Loan at maturity '+tipWarn(MATURITY_TIP), money(p.debtUnits,2)+' '+m.loan, cleared?'0':money(sim.nd,2)+' '+m.loan)}
    ${Rd('Collateral', money(p.col,3)+' '+m.col, sim.nc<=0.00005?'0':money(sim.nc,3)+' '+m.col)}
    ${R('Fixed APY', pct(p.blendedApy))}
    ${opts.feeAmt?R('Origination fee ('+pct(m.origFee,2)+') '+tip(FEE_TIP), '+'+money(opts.feeAmt,2)+' '+m.loan):''}
    ${R('Maturity date', m.maturity)}
    ${Rd('LTV', pct(cur.ltv,1), cleared||sim.nc<=0?'—':pct(sim.ltv,1)+' / '+pct(m.lltv,0), (cleared||sim.nc<=0)?'':liqCls(sim.ltv,m.lltv))}
    ${Rd('Liquidation price', usd(cur.liqPrice)+' per '+m.col, (cleared||sim.nc<=0)?'—':usd(sim.liq)+' per '+m.col, (cleared||sim.nc<=0)?'':liqCls(sim.ltv,m.lltv))}`;
}
function fxSimWarn(sim){
  const m=S.position.m;
  if(sim.nd>0.005 && sim.nc<=0) return 'Cannot withdraw all collateral while debt remains.';
  if(sim.nd>0.005 && sim.ltv>m.lltv+1e-6) return 'Exceeds max LTV — repay more or withdraw less.';
  if(sim.nd>0.005 && sim.hf<1.05) return 'Leaves too little safety buffer.';
  return null;
}
function fxApply(sim,msg){
  const p=S.position;
  p.debtUnits = sim.nd<=0.005?0:sim.nd;
  p.col = sim.nc<=0.00005?0:sim.nc;
  toast(msg); closeModal();
  if(p.debtUnits===0 && p.col===0){ if(S.product==='dash'){ dashRemove(); toast('Position closed'); return; } S.position=null; go('flow','fixed'); toast('Position closed'); }
  else render();
}

/* Repay & withdraw collateral — auto-prices against maturity */
function openRepayEarly(){ openFxRepay(); }
function openRepayMaturity(){ openFxRepay(); }
function openFxRepay(){
  const p=S.position, m=p.m, matured=p.daysLeft<=0;
  const price=fxRepayPrice();
  const fullCost=p.debtUnits*price;
  modal('Repay & withdraw', `
    <div class="field"><label>Repay<span class="bal">Pay off in full: <b>${money(fullCost,2)} ${m.loan}</b></span></label>
      <div class="inp"><input id="rIn" type="text" inputmode="decimal" placeholder="0.00" oninput="fxRepayPrev()"><button class="assetbtn">${tokBadge(m.loan,true)} ${m.loan}</button><button class="maxbtn" onclick="setVal('rIn','${fullCost.toFixed(2)}')">MAX</button></div>${usdSub('rIn',m.loan)}</div>
    <div class="field"><label>Withdraw collateral<span class="bal">Deposited: <b>${money(p.col,3)} ${m.col}</b></span></label>
      <div class="inp"><input id="wIn" type="text" inputmode="decimal" placeholder="0.00" oninput="fxRepayPrev()"><button class="assetbtn">${tokBadge(m.col,true)} ${m.col}</button><button class="maxbtn" onclick="setVal('wIn',fxMaxWithdraw(val('rIn')).toFixed(4))">MAX</button></div>${usdSub('wIn',m.col)}</div>
    <div class="rows" id="simRows">${fxSimRows(fxSim())}</div>
    <div id="simWarn"></div>
    ${bp('Repay + withdraw','Interest does not accrue over time and there is no secondary market, so debt is always repaid at par. Bundle repay and withdrawCollateral so settlement and collateral release are atomic.',
      `<span class="kw">const</span> pos = <span class="kw">await</span> midnight.<span class="fn">getPosition</span>(market, user);\n<span class="kw">await</span> midnight.<span class="fn">bundle</span>([\n  <span class="fn">repay</span>(market, amount), <span class="cm">// 1:1 against debt</span>\n  <span class="fn">withdrawCollateral</span>(market, colAmt),\n]);`)}
    <div class="spacer"></div><button class="btn" id="simBtn" onclick="doFxRepay()">Confirm</button>`);
  fxRepayPrev();
}
function fxRepayPrev(){
  const p=S.position, m=p.m; const price=fxRepayPrice();
  updUsd('rIn',m.loan); updUsd('wIn',m.col);
  const repay=Math.min(val('rIn'), p.debtUnits*price), wd=Math.min(val('wIn'),p.col);
  const sim=fxSim(repay,wd,0,0);
  const rows=document.getElementById('simRows'); if(rows) rows.innerHTML=fxSimRows(sim);
  const warn=fxSimWarn(sim), wEl=document.getElementById('simWarn'), btn=document.getElementById('simBtn');
  if(wEl) wEl.innerHTML = warn?`<div class="warnrow" style="margin-top:12px">⚠ ${warn}</div>`:'';
  if(btn){ const none=repay<=0&&wd<=0; btn.disabled=!!warn||none; btn.textContent = none?'Enter an amount':(repay>0&&wd>0?'Repay & withdraw':repay>0?'Repay':'Withdraw collateral'); }
}
function doFxRepay(){
  const p=S.position; const price=fxRepayPrice();
  const repay=Math.min(val('rIn'), p.debtUnits*price), wd=Math.min(val('wIn'),p.col);
  const sim=fxSim(repay,wd,0,0);
  if(fxSimWarn(sim)||(repay<=0&&wd<=0)) return;
  const parts=[]; if(repay>0)parts.push('repaid '+usd(repay)); if(wd>0)parts.push('withdrew '+money(wd,3)+' '+p.m.col);
  fxApply(sim, parts.join(' · '));
}

/* Add collateral & borrow more — new borrow prices off the current book */
function openAddColFixed(){
  const p=S.position, m=p.m; const bal=m.col==='cbBTC'?1.2:20;
  modal('Add collateral & borrow', `
    <div class="field"><label>Add collateral<span class="bal">Balance: <b>${money(bal,3)} ${m.col}</b></span></label>
      <div class="inp"><input id="acIn" type="text" inputmode="decimal" placeholder="0.00" oninput="fxAddPrev()"><button class="assetbtn">${tokBadge(m.col,true)} ${m.col}</button><button class="maxbtn" onclick="setVal('acIn','${bal}')">MAX</button></div>${usdSub('acIn',m.col)}</div>
    <div class="field"><label>Borrow more<span class="bal">Available: <b id="capLbl">${money(Math.max(0,fxMaxBorrow(0)),0)} ${m.loan}</b></span></label>
      <div class="inp"><input id="boIn" type="text" inputmode="decimal" placeholder="0.00" oninput="fxAddPrev()"><button class="assetbtn">${tokBadge(m.loan,true)} ${m.loan}</button><button class="maxbtn" onclick="setVal('boIn',Math.floor(fxMaxBorrow(val('acIn'))))">MAX</button></div>${usdSub('boIn',m.loan)}</div>
    <div class="rows" id="simRows">${fxSimRows(fxSim())}</div>
    <div id="simWarn"></div>
    <div class="hint">💡 Adding collateral alone improves your buffer — rate and debt don't change. Borrowing more sells additional debt units into the book at the current rate, due on the same maturity date.</div>
    ${bp('Supply collateral + take bids','Bundled atomically. New borrow is quoted against the live book for the remaining term, so it settles on the existing maturity date.',
      `<span class="kw">const</span> q = <span class="kw">await</span> router.<span class="fn">quoteBorrow</span>({ market, borrowAmount });\n<span class="kw">await</span> midnightBundles.<span class="fn">execute</span>([\n  <span class="fn">supplyCollateral</span>(market, colAmt),\n  <span class="fn">takeBids</span>(q.bids, minReceived),\n]);`)}
    <div class="spacer"></div><button class="btn" id="simBtn" onclick="doFxAdd()">Confirm</button>`);
  fxAddPrev();
}
function fxAddPrev(){
  const p=S.position, m=p.m;
  updUsd('acIn',m.col); updUsd('boIn',m.loan);
  const add=val('acIn'), borrow=val('boIn');
  const sim=fxSim(0,0,add,borrow);
  const rows=document.getElementById('simRows'); if(rows) rows.innerHTML=fxSimRows(sim,{feeAmt:sim.feeAmt});
  const cap=document.getElementById('capLbl'); if(cap) cap.textContent=money(Math.max(0,fxMaxBorrow(add)),0)+' '+m.loan;
  const warn=fxSimWarn(sim), wEl=document.getElementById('simWarn'), btn=document.getElementById('simBtn');
  if(wEl) wEl.innerHTML = warn?`<div class="warnrow" style="margin-top:12px">⚠ ${warn}</div>`:'';
  if(btn){ const none=add<=0&&borrow<=0; btn.disabled=!!warn||none; btn.textContent = none?'Enter an amount':(add>0&&borrow>0?'Add collateral & borrow':add>0?'Add collateral':'Borrow'); }
}
function doFxAdd(){
  const p=S.position, m=p.m;
  const add=val('acIn'), borrow=val('boIn');
  const sim=fxSim(0,0,add,borrow);
  if(fxSimWarn(sim)||(add<=0&&borrow<=0)) return;
  if(borrow>0){
    // blend the existing fixed rate with the current book rate, weighted by proceeds
    const oldRecv=p.received||0;
    p.blendedApy = (p.blendedApy*oldRecv + m.bestApy*borrow)/(oldRecv+borrow);
    p.received = oldRecv + borrow;
  }
  const parts=[]; if(add>0)parts.push('added '+money(add,3)+' '+m.col); if(borrow>0)parts.push('borrowed '+money(borrow,2)+' '+m.loan);
  fxApply(sim, parts.join(' · '));
}
function fxClosePosition(){
  const p=S.position;
  openFxRepay();
  setVal('rIn',(p.debtUnits*fxRepayPrice()).toFixed(2));
  setVal('wIn',p.col.toFixed(4));
}
function openExitInfo(){
  modal('Exit options', `
    <div class="rows">
      ${R('Repay any time', 'At par · full interest due')}
      ${R('Partial repay', 'Any amount, reduces debt')}
      ${R('Withdraw collateral', 'Once debt is cleared')}
      ${R('Add collateral', 'Anytime · rate unchanged')}
    </div>
    <div class="hint">💡 There's no secondary market and no early-repayment discount: the full fixed interest is owed for the entire term, so repaying today costs the same as repaying at maturity.</div>
    <div class="spacer"></div><button class="btn ghost" onclick="closeModal()">Got it</button>`);
}

/* -------------------- MODAL + TOAST -------------------- */
function modal(title, body){
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-head"><h4>${title}</h4><button class="x" onclick="closeModal()">✕</button></div>
        <div class="modal-body">${body}</div>
      </div>
    </div>`;
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }
function toast(msg, type='ok'){
  const w=document.getElementById('toasts');
  const el=document.createElement('div'); el.className='toast '+type; el.innerHTML=`<span class="dot"></span>${msg}`;
  w.appendChild(el); setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(8px)';el.style.transition='.3s';setTimeout(()=>el.remove(),300);},2600);
}

/* -------------------- quote countdown for fixed execute -------------------- */
const _origFixed=fixedScreen;
// start timer after render when on fixed execute
function startQuoteTimer(){
  clearTimers();
  let s=24;
  S.quoteTimer=setInterval(()=>{
    const el=document.getElementById('qsecs'); if(!el){clearTimers();return;}
    s--; if(s<=0){ s=24; toast('Quote refreshed','info'); }
    el.textContent=s;
  },1000);
}

// hook render to manage timers
const _render=render;
render=function(){ _render(); if(S.product==='fixed'&&S.step===2&&!S.txDone){ startQuoteTimer(); } };

/* -------------------- THEME (light / dark) -------------------- */
const SUN_SVG  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
const MOON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
function themeIcon(){ return S.theme==='light' ? MOON_SVG : SUN_SVG; }
function applyTheme(){
  document.documentElement.dataset.theme = S.theme;
  const btn=document.getElementById('themeToggle'); if(btn) btn.innerHTML=themeIcon();
}
function toggleTheme(){ S.theme = S.theme==='light' ? 'dark' : 'light'; applyTheme(); }
function mountTopbar(){
  document.getElementById('topbar-right').innerHTML =
    `<button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light / dark theme" title="Toggle light / dark">${themeIcon()}</button>`;
}
if(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches){ S.theme='light'; }
applyTheme();
mountTopbar();

/* -------------------- INIT -------------------- */
render();
</script>
